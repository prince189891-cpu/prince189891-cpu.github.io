    <div id="adModal" class="fixed inset-0 z-[60] hidden items-center justify-center p-6">

    <!-- Toast Notification -->

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();

        let imgData = null;

        // --- PDF Generation with Multi-page Support (Auto-Pagination) ---
        function generatePdf(text, filename) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageHeight = doc.internal.pageSize.height;
            const margin = 15;
            const lineHeight = 7;
            let cursorY = margin;

            // Split text to fit page width
            const lines = doc.splitTextToSize(text, 180);

            lines.forEach(line => {
                if (cursorY + lineHeight > pageHeight - margin) {
                    doc.addPage();
                    cursorY = margin;
                }
                doc.text(line, margin, cursorY);
                cursorY += lineHeight;
            });

            doc.save(filename + '.pdf');
        }

        // --- Ad Sequence Logic (Replace with real SDK code later) ---
        function startAdSequence(callback) {
            const adModal = document.getElementById('adModal');
            const adProgressBar = document.getElementById('adProgressBar');
            const timeLeft = document.getElementById('timeLeft');

            adModal.style.display = 'flex';
            let progress = 0;

            const interval = setInterval(() => {
                progress += 1;
                adProgressBar.style.width = progress + '%';
                timeLeft.textContent = Math.ceil((100 - progress) / 10);

                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        adModal.style.display = 'none';
                        callback();
                        showToast('PDF Downloaded Successfully!');
                    }, 500);
                }
            }, 100);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // --- Download Source Code ---
        function downloadSourceCode() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'index.html';
            link.click();
            URL.revokeObjectURL(url);
            showToast('index.html Downloaded!');
        }

        // --- Handlers ---
        function downloadTextPdf() {
            const text = document.getElementById('textInput').value;
            if (!text.trim()) return showToast('Please enter some text first!');
            startAdSequence(() => generatePdf(text, 'QuickFile_Document'));
        }

 function handleImageUpload(event) {
    const files = event.target.files;
    if (files.length > 0) {
        const reader = new FileReader();
        reader.onload = (e) => {
            imgData = e.target.result;
            const preview = document.getElementById('imagePreview');
            preview.style.backgroundImage = `url(${imgData})`;
            preview.classList.remove('hidden');
            // यहाँ लाइन पूरी होनी चाहिए:
            document.getElementById('uploadText').textContent = `${files.length} Photos Selected`;
        };
        reader.readAsDataURL(files[0]);
    }
 }
         
async function downloadImagePdf() {
    const fileInput = document.getElementById('imageInput');
    const files = fileInput.files;

    if (files.length === 0) return showToast('कृपया पहले फोटो चुनें!');

    // लॉजिक: जितनी ज्यादा फोटो, उतने ज्यादा एड्स (हर 3 फोटो पर 1 एड)
    // कम से कम 2 एड और ज्यादा से ज्यादा 10 एड
    let adCount = Math.min(Math.max(Math.ceil(files.length / 3), 2), 10);
    
    showToast(`${files.length} फोटो के लिए ${adCount} एड्स (15-15 सेकंड) लोड हो रहे हैं...`);

    // एड्स दिखाने का लूप
    for (let i = 1; i <= adCount; i++) {
        await new Promise(resolve => {
            showToast(`एड ${i} चल रहा है (15 सेकंड)...`);
            startAdSequence(() => {
                // 15 सेकंड का इंतज़ार (ताकि ऐप हैंग न हो और कमाई भी हो)
                setTimeout(() => {
                    resolve();
                }, 15000); 
            });
        });
    }

    // एड्स के बाद PDF बनाने का काम शुरू
    generateFinalPdf(files);
}

// यह फंक्शन सारी फोटो को बिना हैंग किए PDF में जोड़ेगा
async function generateFinalPdf(files) {
    showToast('PDF तैयार हो रही है, कृपया रुकें...');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    for (let i = 0; i < files.length; i++) {
        const imgData = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(files[i]);
        });

        const img = new Image();
        img.src = imgData;

        await new Promise(resolve => {
            img.onload = () => {
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                if (i > 0) doc.addPage();
                
                const ratio = Math.min(pageWidth / img.width, pageHeight / img.height);
                const width = img.width * ratio;
                const height = img.height * ratio;
                
                doc.addImage(img, 'JPEG', (pageWidth - width) / 2, (pageHeight - height) / 2, width, height);
                resolve();
            };
        });
    }
    doc.save('QuickFile_Pro.pdf');
    showToast('PDF सफलतापूर्वक डाउनलोड हो गई!');
                             }

        function saveAsTxt() {
            const noteText = document.getElementById('noteText').value;
            const fileName = document.getElementById('fileName').value.trim() || 'note';
            if (!noteText.trim()) return showToast('Please write a note first!');
            startAdSequence(() => {
                const blob = new Blob([noteText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${fileName}.txt`;
                link.click();
                URL.revokeObjectURL(url);
            });
        }

        function saveNoteAsPdf() {
            const noteText = document.getElementById('noteText').value;
            const fileName = document.getElementById('fileName').value.trim() || 'note';
            if (!noteText.trim()) return showToast('Please write a note first!');
            startAdSequence(() => generatePdf(noteText, fileName));
        }
             
        };

  </script>
